<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Face Recognition — CSC-350</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
    }

    /* ── Upload box ── */
    .upload-area {
      width: 300px;
      height: 300px;
      border: 2px dashed #333;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .upload-area:hover { border-color: #666; }
    .upload-area.dragging { border-color: #fff; }

    .upload-area img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 2px;
    }

    .upload-icon {
      font-size: 2.5rem;
      color: #333;
      margin-bottom: 0.5rem;
      pointer-events: none;
    }

    .upload-hint {
      font-size: 0.7rem;
      color: #444;
      text-align: center;
      pointer-events: none;
      line-height: 1.6;
    }

    #fileInput { display: none; }

    /* ── Button ── */
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2.5rem;
      background: #f0f0f0;
      color: #0d0d0d;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover  { background: #fff; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #333; color: #555; cursor: not-allowed; }

    /* ── Results ── */
    .results {
      margin-top: 2rem;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .result-card {
      padding: 0.9rem 1.2rem;
      border: 1px solid #222;
      border-radius: 2px;
      background: #111;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-card .model-name {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
    }

    .result-card .verdict {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .verdict.me      { color: #4ade80; }   /* green */
    .verdict.not-me  { color: #f87171; }   /* red   */
    .verdict.error   { color: #facc15; font-size: 0.85rem; }

    .result-card .confidence {
      font-size: 0.72rem;
      color: #666;
    }

    /* ── Loader ── */
    .loader {
      margin-top: 2rem;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: #444;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    .loader.active { display: flex; }

    .dots span {
      animation: blink 1.2s infinite;
      font-size: 1.2rem;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%           { opacity: 1; }
    }
  </style>
</head>
<body>

  <h1>Face Recognition</h1>
  <p class="subtitle">CSC-350 Artificial Intelligence — Visual Recognition System</p>

  <!-- Upload area -->
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">⊕</div>
    <div class="upload-hint">Click or drag & drop<br>an image here</div>
  </div>
  <input type="file" id="fileInput" accept="image/*">

  <!-- Analyse button -->
  <button id="analyseBtn" onclick="predict()" disabled>Analyse</button>

  <!-- Loading indicator -->
  <div class="loader" id="loader">
    <div class="dots"><span>●</span><span>●</span><span>●</span></div>
    <span>Analysing...</span>
  </div>

  <!-- Results -->
  <div class="results" id="results"></div>

<script>
  const uploadArea  = document.getElementById("uploadArea");
  const fileInput   = document.getElementById("fileInput");
  const analyseBtn  = document.getElementById("analyseBtn");
  const loader      = document.getElementById("loader");
  const resultsDiv  = document.getElementById("results");

  let selectedFile = null;

  // ── File selection via input ──────────────
  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  // ── Drag & drop ───────────────────────────
  uploadArea.addEventListener("dragover", e => {
    e.preventDefault();
    uploadArea.classList.add("dragging");
  });
  uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("dragging"));
  uploadArea.addEventListener("drop", e => {
    e.preventDefault();
    uploadArea.classList.remove("dragging");
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    selectedFile = file;
    analyseBtn.disabled = false;
    resultsDiv.innerHTML = "";

    // Preview
    const reader = new FileReader();
    reader.onload = ev => {
      uploadArea.innerHTML = `<img src="${ev.target.result}" alt="preview">`;
    };
    reader.readAsDataURL(file);
  }

  // ── Prediction ────────────────────────────
  async function predict() {
    if (!selectedFile) return;

    analyseBtn.disabled = true;
    loader.classList.add("active");
    resultsDiv.innerHTML = "";

    const formData = new FormData();
    formData.append("image", selectedFile);

    try {
      const res  = await fetch("/predict", { method: "POST", body: formData });
      const data = await res.json();

      loader.classList.remove("active");
      renderResults(data);
    } catch (err) {
      loader.classList.remove("active");
      resultsDiv.innerHTML = `<div class="result-card">
        <span class="verdict error">⚠ Network error — is Flask running?</span>
      </div>`;
    }

    analyseBtn.disabled = false;
  }

  // ── Render result cards ───────────────────
  function renderResults(data) {
    const models = [
      { key: "sklearn",   name: "Conventional ML (scikit-learn)" },
      { key: "teachable", name: "Teachable Machine (Keras)"      },
    ];

    models.forEach(({ key, name }) => {
      const info = data[key];
      let verdictHTML;

      if (info.error) {
        verdictHTML = `<span class="verdict error">⚠ ${info.error}</span>`;
      } else {
        const cls  = info.label === "ME" ? "me" : "not-me";
        const icon = info.label === "ME" ? "✔" : "✘";
        verdictHTML = `
          <span class="verdict ${cls}">${icon} ${info.label}</span>
          <span class="confidence">Confidence: ${info.confidence}%</span>
        `;
      }

      resultsDiv.innerHTML += `
        <div class="result-card">
          <span class="model-name">${name}</span>
          ${verdictHTML}
        </div>
      `;
    });
  }
</script>
</body>
</html>
